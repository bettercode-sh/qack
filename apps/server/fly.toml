# fly.toml app configuration file generated for qack-server on 2026-07-02T23:08:57-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'qack-server'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  MAIL_DOMAIN = 'qack.dev'
  PORT = '8080'
  SMTP_PORT = '2525'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[services]]
  protocol = 'tcp'
  internal_port = 2525
  processes = ['app']

  [[services.ports]]
    port = 25

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
